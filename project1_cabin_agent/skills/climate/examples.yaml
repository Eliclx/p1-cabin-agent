# Climate Skill Few-shot Examples

ac_control:
  - input: "打开空调"
    output:
      intent: "ac_control"
      slots:
        action: "on"
    tags: ["literal"]
  - input: "空调调到22度"
    output:
      intent: "ac_control"
      slots:
        action: "adjust"
        temperature: 22
    tags: ["literal"]
  - input: "太热了"
    output:
      intent: "ac_control"
      slots:
        action: "adjust"
        mode: "cool"
    tags: ["implicit"]

window_control:
  - input: "开窗"
    output:
      intent: "window_control"
      slots:
        target: "window"
        action: "open"
    tags: ["literal"]
  - input: "关窗"
    output:
      intent: "window_control"
      slots:
        target: "window"
        action: "close"
    tags: ["literal"]
  - input: "天窗打开"
    output:
      intent: "window_control"
      slots:
        target: "sunroof"
        action: "open"
    tags: ["literal"]

light_control:
  - input: "开灯"
    output:
      intent: "light_control"
      slots:
        action: "on"
    tags: ["literal"]
  - input: "关灯"
    output:
      intent: "light_control"
      slots:
        action: "off"
    tags: ["literal"]

seat_control:
  - input: "打开座椅加热"
    output:
      intent: "seat_control"
      slots:
        action: "heat_on"
    tags: ["literal"]
  - input: "关座椅通风"
    output:
      intent: "seat_control"
      slots:
        action: "ventilate_off"
    tags: ["literal"]

cabin_query:
  - input: "空调多少度"
    output:
      intent: "cabin_query"
      slots:
        items: "ac_temp"
    tags: ["literal"]
  - input: "车内温度"
    output:
      intent: "cabin_query"
      slots:
        items: "cabin_temp"
    tags: ["literal"]
  - input: "湿度怎么样"
    output:
      intent: "cabin_query"
      slots:
        items: "humidity"
    tags: ["literal"]
  - input: "空调风速几档"
    output:
      intent: "cabin_query"
      slots:
        items: "fan_level"
    tags: ["literal"]
  - input: "空调开的什么模式"
    output:
      intent: "cabin_query"
      slots:
        items: "ac_mode"
    tags: ["literal"]
